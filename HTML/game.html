<!DOCTYPE html>
<html> 
    <head> 
        <!--Bestanden linken-->
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../CSS/styles.css">
        <script src="../JS/app.js" defer></script>
        <title>Game</title>
    </head>
    <body>
        <header class="gameHeader">
            <div class="logoContainer">
                <img src="../MEDIA/logo.png" alt="logo" class="logo">
                <h1>My Clicker Game</h1>
            </div>
        </header>
        <p id="playerInfo"></p>

        <h2>Start clicking when you're ready!</h2>

        <!--Alle knoppen en hun containers-->
        <div class="theButtonContainer">
            <p id="coinCount">Coins: 0</p>
            <button class="clickButton" onclick="clickButton()">Click me!</button>
        </div>

        <div class="upgradeContainer">
            <button id="upgradeButton" onclick="buyUpgrade()">Upgrade (Cost: 50 coins)</button>
            <button id="ultraUpgradeButton" onclick="buyUltraUpgrade()">Ultra Upgrade (Cost: 1000 coins)</button>
        </div>

        <div class="backContainer">
            <button class="backButton" onclick="GoBack()">Back</button>
        </div>
        <h3>How fun is this game?</h3>
        <footer class="gameFooter">
            
        </footer>
    </body>
</html>
